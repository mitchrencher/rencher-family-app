const isBusinessEmail = (email) => {
  const freeEmailDomains = ['gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com', 'aol.com', 'icloud.com', 'mail.com', 'protonmail.com', 'zoho.com', 'yandex.com', 'gmx.com', 'live.com', 'msn.com', 'me.com'];
  const domain = email.split('@')[1]?.toLowerCase();
  return domain && !freeEmailDomains.includes(domain);
};

const formatCurrency = (amount) => {
  if (amount >= 1e9) return `$${(amount / 1e9).toFixed(2)}B`;
  if (amount >= 1e6) return `$${(amount / 1e6).toFixed(1)}M`;
  if (amount >= 1e3) return `$${(amount / 1e3).toFixed(0)}K`;
  return `$${amount.toFixed(0)}`;
};

const formatPercent = (value) => `${(value * 100).toFixed(1)}%`;

// =============================================================================
// DATA CONSTANTS
// =============================================================================

const growthOptions = [

  }

const TRUST_TYPES = {
  slat: { name: 'Spousal Lifetime Access Trust', shortName: 'SLAT', type: 'grantor', description: 'Transfer assets to avoid estate tax while your spouse maintains access to the funds.', benefits: ['Use lifetime exemption ($13.61M)', 'Spouse can access funds', 'Assets grow outside estate', 'Asset protection'], bestFor: 'Married couples wanting estate tax reduction' },
  slant: { name: 'Spousal Lifetime Access Non-Grantor Trust', shortName: 'SLANT', type: 'non-grantor', description: 'Like a SLAT, but the trust pays its own taxes—enabling QSBS stacking for additional $15M exclusions.', benefits: ['Stack QSBS exclusions ($15M each)', 'State income tax savings', 'Estate tax reduction', 'Separate tax entity'], bestFor: 'QSBS holders wanting to multiply their exclusion' },
  wing: { name: 'Wyoming Incomplete Non-Grantor Trust', shortName: 'WING', type: 'non-grantor', description: 'Eliminate state income tax on investment gains while retaining access and getting step-up in basis at death.', benefits: ['Eliminate state income tax', 'Retain access to funds', 'Step-up in basis at death', 'Wyoming asset protection'], bestFor: 'High-tax state residents with large gains' },
  idit: { name: 'Intentionally Defective Grantor Trust', shortName: 'IDIT', type: 'grantor', description: 'Sell assets to the trust in exchange for a promissory note, freezing your estate value.', benefits: ['Freeze estate value', 'No gift tax on sale', 'All appreciation outside estate', 'You pay trust taxes'], bestFor: 'Pre-liquidity planning' },
  daf: { name: 'Donor Advised Fund', shortName: 'DAF', type: 'charitable', description: 'Contribute appreciated assets before a sale for immediate tax deduction.', benefits: ['Immediate charitable deduction', 'Avoid capital gains entirely', 'Tax-free growth', 'Flexible grant timing'], bestFor: 'Philanthropic founders pre-exit' },
  crt: { name: 'Charitable Remainder Trust', shortName: 'CRT', type: 'charitable', description: 'Receive income for life while the remainder goes to charity.', benefits: ['Lifetime income stream', 'Partial charitable deduction', 'Capital gains deferral'], bestFor: 'Income + charitable goals' },
  dynasty: { name: 'Dynasty Trust', shortName: 'Dynasty', type: 'non-grantor', description: 'Multi-generational wealth transfer lasting up to 1,000 years.', benefits: ['1,000-year duration', 'GST tax exemption', 'Multi-generational protection'], bestFor: 'Long-term family wealth' },
  grat: { name: 'Grantor Retained Annuity Trust', shortName: 'GRAT', type: 'grantor', description: 'Transfer appreciating assets while keeping an annuity stream.', benefits: ['Near-zero gift tax', 'Keep annuity payments', 'Transfer appreciation'], bestFor: 'High-growth asset transfers' }

const SECTIONS = [
  { id: 'valuation', name: 'Business Valuation', description: 'Estimate your enterprise value' },
  { id: 'optimizer', name: 'Exit Optimization', description: 'See your optimized tax bill' },
  { id: 'estate', name: 'Estate Planning', description: 'Find the right strategies' },
  { id: 'report', name: 'Your Report', description: 'Share with your team' }

// =============================================================================
// SHAREABLE REPORT COMPONENT
// =============================================================================
function ShareableReport({ data, verifiedUser, onShare }) {
  const [showShareModal, setShowShareModal] = useState(false);
  const [shareEmails, setShareEmails] = useState('');
  const [shareMessage, setShareMessage] = useState('');
  const [shareSent, setShareSent] = useState(false);
  const [copied, setCopied] = useState(false);

  // Calculate all values for the report
  const enterpriseValue = data.enterpriseValue || data.knownValuation;
  const debt = parseFloat(data.debt) * 1e6 || 0;
  const cash = parseFloat(data.cash) * 1e6 || 0;
  const equityValue = data.equityValue ? data.equityValue * 1e6 : (enterpriseValue ? enterpriseValue * 1e6 - debt + cash : 0);
  const ownershipPct = parseFloat(data.ownershipPercent) / 100 || 0;
  const proceeds = equityValue * ownershipPct;
  const costBasis = (parseFloat(data.costBasis) || 0) * 1e6;
  const gain = proceeds - costBasis;
  const stateRate = TAX_RATES.states[data.state]?.rate || 0;
  const fedRate = data.holdingPeriod === 'under-1' ? TAX_RATES.federalSTCG : TAX_RATES.federalLTCG;
  const totalRate = fedRate + TAX_RATES.federalNIIT + stateRate;
  const baselineTax = gain * totalRate;

  // Optimization calculations
  const married = data.married;
  const hasChildren = data.hasChildren;
  const philanthropic = data.philanthropic;
  const allocation = {
    entrepreneur: data.alloc_entrepreneur ?? 40,
    spouse: data.alloc_spouse ?? 30,
    kids: data.alloc_kids ?? 20,
    charity: data.alloc_charity ?? 10
  };

  const qsbsEligible = data.entityType === 'c-corp' && data.holdingPeriod === '5-plus';
  const qsbsLimit = TAX_RATES.qsbsExclusionLimit;

  const entProceeds = proceeds * (allocation.entrepreneur / 100);
  const spouseProceeds = married ? proceeds * (allocation.spouse / 100) : 0;
  const kidsProceeds = hasChildren ? proceeds * (allocation.kids / 100) : 0;
  const charityProceeds = philanthropic ? proceeds * (allocation.charity / 100) : 0;

  const entQSBS = qsbsEligible ? Math.min(entProceeds, qsbsLimit) * fedRate : 0;
  const spouseQSBS = qsbsEligible && married ? Math.min(spouseProceeds, qsbsLimit) * fedRate : 0;
  const kidsQSBS = qsbsEligible && hasChildren ? Math.min(kidsProceeds, qsbsLimit) * fedRate : 0;
  const totalQSBS = entQSBS + spouseQSBS + kidsQSBS;

  const trustSavings = stateRate > 0 ? (spouseProceeds + kidsProceeds) * stateRate : 0;
  const charitySavings = charityProceeds * totalRate;
  const totalSavings = totalQSBS + trustSavings + charitySavings;
  const optimizedTax = Math.max(0, baselineTax - totalSavings);

  // Trust recommendations with full details
  const recommendations = [];
  const stateTier = TAX_RATES.states[data.state]?.tier;
  if (qsbsEligible && married) recommendations.push({ ...TRUST_TYPES.slant, priority: 'Critical', reason: 'Stack QSBS exclusions across multiple trusts for $15M+ each' });
  if (stateTier === 'high') recommendations.push({ ...TRUST_TYPES.wing, priority: 'Critical', reason: `Eliminate ${TAX_RATES.states[data.state]?.name} state income tax on your gains` });
  else if (stateTier === 'medium') recommendations.push({ ...TRUST_TYPES.wing, priority: 'High', reason: 'Reduce state income tax while retaining access' });
  if (married) recommendations.push({ ...TRUST_TYPES.slat, priority: 'High', reason: 'Use lifetime exemption ($13.61M) with continued spousal access' });
  if (philanthropic) recommendations.push({ ...TRUST_TYPES.daf, priority: 'High', reason: 'Immediate charitable deduction + avoid capital gains on donated shares' });
  recommendations.push({ ...TRUST_TYPES.idit, priority: 'Medium', reason: 'Freeze estate value pre-exit, all appreciation passes tax-free' });
  if (hasChildren) recommendations.push({ ...TRUST_TYPES.dynasty, priority: 'Medium', reason: 'Multi-generational wealth transfer with perpetual protection' });

  const reportDate = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

  // Build next steps based on recommendations
  const nextSteps = [];
  let stepNum = 1;
  
  // Immediate actions (0-30 days)
  const immediateSteps = [];
  if (qsbsEligible) {
    immediateSteps.push({ action: 'Confirm QSBS eligibility with tax counsel', detail: 'Verify qualified small business stock status and holding period' });
  }
  if (!qsbsEligible && data.entityType !== 'c-corp') {
    immediateSteps.push({ action: 'Evaluate C-Corp conversion', detail: 'Assess feasibility of converting to C-Corp to unlock QSBS benefits' });
  }
  if (married || hasChildren) {
    immediateSteps.push({ action: 'Engage estate planning attorney', detail: 'Begin trust structure discussions and entity formation' });
  }
  immediateSteps.push({ action: 'Gather key documents', detail: 'Cap table, operating agreements, stock purchase agreements, prior valuations' });

  // Near-term actions (30-90 days)
  const nearTermSteps = [];
  recommendations.filter(r => r.priority === 'Critical').forEach(rec => {
    nearTermSteps.push({ action: `Establish ${rec.shortName}`, detail: rec.reason });
  });
  if (stateRate > 0) {
    nearTermSteps.push({ action: 'Complete trust funding', detail: 'Transfer ownership interests to trusts before exit negotiations' });
  }

  // Pre-exit actions (90+ days)
  const preExitSteps = [];
  recommendations.filter(r => r.priority === 'High').forEach(rec => {
    preExitSteps.push({ action: `Set up ${rec.shortName}`, detail: rec.reason });
  });
  if (philanthropic) {
    preExitSteps.push({ action: 'Finalize charitable strategy', detail: 'Determine DAF contribution amount and grant schedule' });
  }
  preExitSteps.push({ action: 'Coordinate with M&A counsel', detail: 'Ensure deal structure aligns with tax optimization plan' });

  const handleShare = () => {
    const shareData = {
      to: shareEmails.split(',').map(e => e.trim()),
      from: verifiedUser.email,
      userName: verifiedUser.userName,
      companyName: verifiedUser.companyName,
      message: shareMessage,
      reportData: {
        enterpriseValue,
        equityValue,
        proceeds,
        baselineTax,
        optimizedTax,
        totalSavings,
        recommendations: recommendations.slice(0, 3)
      }
    };
    
    console.log('📧 Share Report Request:', shareData);
    if (onShare) onShare(shareData);
    
    setShareSent(true);
    setTimeout(() => {
      setShowShareModal(false);
      setShareSent(false);
      setShareEmails('');
      setShareMessage('');
    }, 2000);
  };

  const copyReportLink = () => {
    navigator.clipboard.writeText(window.location.href);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const getPriorityStyles = (priority) => {
    switch (priority) {
      case 'Critical': return 'bg-red-500/20 text-red-400 border-red-500/30';
      case 'High': return 'bg-amber-500/20 text-amber-400 border-amber-500/30';
      default: return 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
    }
  };

  const getTypeStyles = (type) => {
    switch (type) {
      case 'grantor': return 'bg-cyan-500/20 text-cyan-400';
      case 'non-grantor': return 'bg-purple-500/20 text-purple-400';
      default: return 'bg-rose-500/20 text-rose-400';
    }
  };

  return (
    <div className="space-y-8">
      {/* Report Header */}
      <div className="flex items-center justify-between flex-wrap gap-4">
        <div>
          <h2 className="text-4xl font-bold text-white mb-3">Your Exit Plan</h2>
          <p className="text-slate-400 text-lg">Prepared for {verifiedUser?.companyName} • {reportDate}</p>
        </div>
        <div className="flex items-center gap-3">
          <button
            onClick={copyReportLink}
            className="flex items-center gap-2 px-4 py-2.5 bg-slate-800 text-slate-300 font-medium rounded-xl border border-slate-700 hover:bg-slate-700 transition-all"
          >
            {copied ? (
              <>
                <svg className="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                Copied!
              </>
            ) : (
              <>
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                Copy Link
              </>
            )}
          </button>
          <button
            onClick={() => setShowShareModal(true)}
            className="flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-emerald-500/25 transition-all"
          >
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            Email Report
          </button>
        </div>
      </div>

      {/* Executive Summary */}
      <div className="relative overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl border border-slate-700/50 p-10">
        <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 rounded-full blur-3xl"></div>
        <div className="relative">
          <h3 className="text-sm font-semibold text-emerald-400 uppercase tracking-wider mb-6">Executive Summary</h3>
          
          <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
            <div className="text-center p-4 bg-slate-800/50 rounded-2xl">
              <p className="text-slate-500 text-xs uppercase tracking-wide mb-2">Enterprise Value</p>
              <p className="text-3xl font-bold text-white">{formatCurrency(enterpriseValue * 1e6)}</p>
            </div>
            <div className="text-center p-4 bg-slate-800/50 rounded-2xl">
              <p className="text-slate-500 text-xs uppercase tracking-wide mb-2">Your Proceeds</p>
              <p className="text-3xl font-bold text-emerald-400">{formatCurrency(proceeds)}</p>
            </div>
            <div className="text-center p-4 bg-slate-800/50 rounded-2xl">
              <p className="text-slate-500 text-xs uppercase tracking-wide mb-2">Tax Without Planning</p>
              <p className="text-3xl font-bold text-red-400">{formatCurrency(baselineTax)}</p>
            </div>
            <div className="text-center p-4 bg-slate-800/50 rounded-2xl">
              <p className="text-slate-500 text-xs uppercase tracking-wide mb-2">Your Savings</p>
              <p className="text-3xl font-bold text-emerald-400">{formatCurrency(totalSavings)}</p>
            </div>
          </div>

          <div className="flex items-center justify-center gap-8 p-6 bg-gradient-to-r from-emerald-500/10 to-cyan-500/10 rounded-2xl border border-emerald-500/20">
            <div className="text-center">
              <p className="text-slate-400 text-sm">Without Planning</p>
              <p className="text-2xl font-bold text-red-400">{formatCurrency(baselineTax)}</p>
              <p className="text-slate-500 text-xs">({formatPercent(totalRate)} effective rate)</p>
            </div>
            <div className="text-4xl text-emerald-400">→</div>
            <div className="text-center">
              <p className="text-slate-400 text-sm">With Optimization</p>
              <p className="text-2xl font-bold text-emerald-400">{formatCurrency(optimizedTax)}</p>
              <p className="text-slate-500 text-xs">({formatPercent(gain > 0 ? optimizedTax / gain : 0)} effective rate)</p>
            </div>
          </div>
        </div>
      </div>

      {/* Your Situation */}
      <div className="grid md:grid-cols-2 gap-6">
        <div className="bg-slate-800/30 rounded-3xl border border-slate-700/50 p-8">
          <h3 className="text-sm font-semibold text-cyan-400 uppercase tracking-wider mb-6">Financial Overview</h3>
          <div className="space-y-4">
            <div className="flex justify-between py-2 border-b border-slate-700/50">
              <span className="text-slate-400">Enterprise Value</span>
              <span className="text-white font-medium">{formatCurrency(enterpriseValue * 1e6)}</span>
            </div>
            <div className="flex justify-between py-2 border-b border-slate-700/50">
              <span className="text-slate-400">Less: Debt</span>
              <span className="text-red-400 font-medium">({formatCurrency(debt)})</span>
            </div>
            <div className="flex justify-between py-2 border-b border-slate-700/50">
              <span className="text-slate-400">Plus: Cash</span>
              <span className="text-emerald-400 font-medium">{formatCurrency(cash)}</span>
            </div>
            <div className="flex justify-between py-2 border-b border-slate-700/50">
              <span className="text-slate-400">Equity Value</span>
              <span className="text-white font-bold">{formatCurrency(equityValue)}</span>
            </div>
            <div className="flex justify-between py-2 border-b border-slate-700/50">
              <span className="text-slate-400">Your Ownership</span>
              <span className="text-white font-medium">{data.ownershipPercent}%</span>
            </div>
            <div className="flex justify-between py-2">
              <span className="text-white font-semibold">Your Proceeds</span>
              <span className="text-emerald-400 font-bold text-xl">{formatCurrency(proceeds)}</span>
            </div>
          </div>
        </div>

        <div className="bg-slate-800/30 rounded-3xl border border-slate-700/50 p-8">
          <h3 className="text-sm font-semibold text-amber-400 uppercase tracking-wider mb-6">Optimization Allocation</h3>
          <div className="space-y-4">
            <div className="p-4 bg-slate-800/50 rounded-xl">
              <div className="flex justify-between items-center">
                <span className="text-slate-300">You (Personal)</span>

function EmailVerificationModal({ onVerified, onClose, title, subtitle }) {
  const [email, setEmail] = useState('');
  const [userName, setUserName] = useState('');
  const [companyName, setCompanyName] = useState('');
  const [verificationCode, setVerificationCode] = useState('');
  const [sentCode, setSentCode] = useState(null);
  const [step, setStep] = useState('email');
  const [error, setError] = useState('');

  const sendVerificationCode = () => {
    if (!userName.trim()) { setError('Please enter your name'); return; }
    if (!companyName.trim()) { setError('Please enter your company name'); return; }
    if (!email) { setError('Please enter your email'); return; }
    if (!isBusinessEmail(email)) { setError('Please use a business email address'); return; }
    const code = Math.floor(100000 + Math.random() * 900000).toString();
    setSentCode(code);
    setStep('code');
    setError('');
    console.log('Verification code (demo):', code);
  };

  const verifyCode = () => {
    if (verificationCode === sentCode) onVerified({ email, userName, companyName });
    else setError('Invalid verification code');
  };

  return (
    <div className="fixed inset-0 bg-black/70 backdrop-blur-md flex items-center justify-center p-4 z-50">
      <div className="relative w-full max-w-md bg-gradient-to-b from-slate-800 to-slate-900 rounded-3xl p-8 shadow-2xl border border-slate-700/50">
        <button onClick={onClose} className="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
        
        <div className="text-center mb-8">
          <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-emerald-400 to-cyan-400 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-emerald-500/25">
            <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
          </div>
          <h2 className="text-2xl font-bold text-white mb-2">{title || 'Unlock Your Results'}</h2>
          <p className="text-slate-400">{subtitle || (step === 'email' ? 'Verify your business email to continue' : 'Enter the 6-digit code sent to your email')}</p>
        </div>

        {error && <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm">{error}</div>}

        {step === 'email' ? (
          <div className="space-y-4">
            <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} placeholder="Your Name" className="w-full px-4 py-4 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
            <input type="text" value={companyName} onChange={(e) => setCompanyName(e.target.value)} placeholder="Company Name" className="w-full px-4 py-4 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="work@company.com" className="w-full px-4 py-4 bg-slate-900/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all" />
            <button onClick={sendVerificationCode} className="w-full py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-emerald-500/25 transition-all hover:-translate-y-0.5">Send Verification Code</button>
          </div>
        ) : (
          <div className="space-y-4">
            <p className="text-center text-sm text-slate-400">Code sent to <span className="text-emerald-400 font-medium">{email}</span></p>
            <p className="text-center text-xs text-amber-400 bg-amber-500/10 border border-amber-500/20 rounded-lg py-2">(Demo: check browser console)</p>

            <button onClick={verifyCode} className="w-full py-4 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-semibold rounded-xl hover:shadow-lg hover:shadow-emerald-500/25 transition-all hover:-translate-y-0.5">Verify & Continue</button>
            <button onClick={() => { setStep('email'); setSentCode(null); setVerificationCode(''); }} className="w-full py-2 text-slate-400 text-sm hover:text-white transition-colors">← Back</button>
          </div>
        )}
      </div>
    </div>
  );
}

function Sidebar({ activeSection, setActiveSection, completedSections, data, advisorMode }) {
  const getStatus = (id) => {
    if (completedSections.includes(id)) return 'complete';
    if (id === activeSection) return 'active';
    return 'pending';
  };

  // Filter sections based on mode - hide report in public mode
  const visibleSections = advisorMode ? SECTIONS : SECTIONS.filter(s => s.id !== 'report');

  const SectionIcon = ({ id, status }) => {
    const iconClass = "w-5 h-5";
    
    if (status === 'complete') {
      return <svg className={`${iconClass} text-emerald-400`} fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" /></svg>;
    }
    
    const color = status === 'active' ? 'text-white' : 'text-slate-400';
    
    switch (id) {
      case 'valuation':
        return <svg className={`${iconClass} ${color}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>;
      case 'optimizer':
        return <svg className={`${iconClass} ${color}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>;
      case 'estate':
        return <svg className={`${iconClass} ${color}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>;
      case 'report':
        return <svg className={`${iconClass} ${color}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>;
      default:
        return null;
    }
  };

  const getGradient = (id) => {
    switch (id) {
      case 'valuation': return 'from-emerald-500 to-cyan-500';
      case 'optimizer': return 'from-amber-500 to-orange-500';
      case 'estate': return 'from-purple-500 to-pink-500';
      case 'report': return 'from-blue-500 to-indigo-500';
      default: return 'from-slate-500 to-slate-600';
    }
  };

  const getGlow = (id) => {
    switch (id) {
      case 'valuation': return 'shadow-emerald-500/20';
      case 'optimizer': return 'shadow-amber-500/20';
      case 'estate': return 'shadow-purple-500/20';
      case 'report': return 'shadow-blue-500/20';

  return (
    <div className="w-72 flex-shrink-0">
      <div className="sticky top-24 space-y-3">
        {visibleSections.map((section) => {
          const status = getStatus(section.id);
          return (
            <button
              key={section.id}
              onClick={() => setActiveSection(section.id)}
              className={`w-full text-left p-4 rounded-2xl transition-all duration-300 ${
                status === 'active' 
                  ? `bg-gradient-to-r ${getGradient(section.id)} shadow-lg ${getGlow(section.id)}` 
                  : status === 'complete'

            >
              <div className="flex items-center gap-4">
                <div className={`w-11 h-11 rounded-xl flex items-center justify-center ${

                      ? 'bg-emerald-500/20'

                }`}>
                  <SectionIcon id={section.id} status={status} />
                </div>
                <div>
                  <p className={`font-semibold ${status === 'active' ? 'text-white' : status === 'complete' ? 'text-emerald-400' : 'text-slate-300'}`}>
                    {section.name}
                  </p>
                  <p className={`text-xs ${status === 'active' ? 'text-white/70' : 'text-slate-500'}`}>{section.description}</p>
                </div>
              </div>
            </button>
          );
        })}

        {/* Summary Stats */}
        {(data.enterpriseValue || data.knownValuation) && (
          <div className="mt-8 p-5 bg-slate-800/60 rounded-2xl border border-slate-700/50 backdrop-blur">
            <p className="text-slate-500 text-xs font-semibold uppercase tracking-wider mb-4">Summary</p>
            <div className="space-y-3">
              <div className="flex justify-between items-center">
                <span className="text-slate-400 text-sm">Enterprise Value</span>
                <span className="text-white font-bold">{formatCurrency((data.enterpriseValue || data.knownValuation) * 1e6)}</span>
              </div>
              {data.equityValue && data.equityValue !== data.enterpriseValue && (
                <div className="flex justify-between items-center">
                  <span className="text-slate-400 text-sm">Equity Value</span>
                  <span className="text-white font-bold">{formatCurrency(data.equityValue * 1e6)}</span>
                </div>
              )}
              {data.ownershipPercent && (
                <div className="flex justify-between items-center">
                  <span className="text-slate-400 text-sm">Your Ownership</span>
                  <span className="text-emerald-400 font-bold">{data.ownershipPercent}%</span>
                </div>
              )}
              {data.debt && parseFloat(data.debt) > 0 && (
                <div className="flex justify-between items-center">
                  <span className="text-slate-400 text-sm">Debt</span>
                  <span className="text-red-400 font-bold">-{formatCurrency(parseFloat(data.debt) * 1e6)}</span>

              {data.state && (

                  <span className="text-slate-400 text-sm">State</span>
                  <span className="text-slate-300">{TAX_RATES.states[data.state]?.name}</span>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function ValuationSection({ data, setData, onComplete, verifiedUser, onRequestVerification }) {
  const [showResults, setShowResults] = useState(false);
  const [useKnownValue, setUseKnownValue] = useState(false);

  const canCalculate = useKnownValue 
    ? (data.knownValuation && data.ownershipPercent) 
    : (data.industry && data.revenue && data.ebitda && data.growth && data.ownershipPercent);

  const calculateValuation = () => {
    const debt = parseFloat(data.debt) * 1e6 || 0;
    const cash = parseFloat(data.cash) * 1e6 || 0;
    
    if (useKnownValue) {
      const ev = parseFloat(data.knownValuation) * 1e6;
      const equityValue = ev - debt + cash;
      setData(prev => ({ 
        ...prev, 
        enterpriseValue: parseFloat(prev.knownValuation),
        equityValue: equityValue / 1e6,
        valuation: parseFloat(prev.knownValuation)
      }));
    } else {
      const ind = industries[data.industry];
      const rev = parseFloat(data.revenue) * 1e6;
      const ebit = parseFloat(data.ebitda) * 1e6;
      const growthFactor = growthOptions.find(g => g.value === data.growth)?.factor || 1;
      const recurringPrem = data.recurring ? 1.15 : 1;
      const margin = rev > 0 ? (ebit / rev) : 0;
      const marginPrem = margin > 0.3 ? 1.15 : margin > 0.2 ? 1.05 : margin > 0.1 ? 1 : 0.9;
      const adjMultiple = ind.baseMultiple * growthFactor * recurringPrem * marginPrem;
      const enterpriseValue = ebit * adjMultiple;
      const equityValue = enterpriseValue - debt + cash;
      const lowEV = enterpriseValue * 0.75;
      const highEV = enterpriseValue * 1.3;
      
      setData(prev => ({ 
        ...prev, 
        enterpriseValue: enterpriseValue / 1e6,
        equityValue: equityValue / 1e6,
        valuation: enterpriseValue / 1e6,
        calculatedMultiple: adjMultiple, 
        lowValuation: lowEV / 1e6, 
        highValuation: highEV / 1e6 
      }));
    }
    
    if (!verifiedUser) {
      onRequestVerification();
    } else {
      setShowResults(true);
    }
  };

  React.useEffect(() => {
    if (verifiedUser && data.enterpriseValue && !showResults) {
      setShowResults(true);
    }
  }, [verifiedUser, data.enterpriseValue]);

  const enterpriseValue = data.enterpriseValue || data.knownValuation;
  const debt = parseFloat(data.debt) * 1e6 || 0;
  const cash = parseFloat(data.cash) * 1e6 || 0;
  const equityValue = data.equityValue ? data.equityValue * 1e6 : (enterpriseValue ? enterpriseValue * 1e6 - debt + cash : 0);
  const ownershipPct = parseFloat(data.ownershipPercent) / 100 || 0;
  const proceeds = equityValue * ownershipPct;
  
  const stateRate = TAX_RATES.states[data.state]?.rate || 0;
  const costBasis = (parseFloat(data.costBasis) || 0) * 1e6;
  const gain = proceeds - costBasis;
  const fedRate = data.holdingPeriod === 'under-1' ? TAX_RATES.federalSTCG : TAX_RATES.federalLTCG;
  const totalRate = fedRate + TAX_RATES.federalNIIT + stateRate;
  const baselineTax = gain * totalRate;

  const inputClass = "w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 transition-all";
  const selectClass = "w-full px-4 py-4 bg-slate-800/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500 appearance-none cursor-pointer transition-all";
  const labelClass = "text-slate-300 text-sm font-medium mb-2 block";

  return (
    <div className="space-y-8">
      {/* Header */}
      <div>
        <h2 className="text-4xl font-bold text-white mb-3">Business Valuation</h2>
        <p className="text-slate-400 text-lg">Estimate your enterprise value based on 90,000+ M&A transactions</p>
      </div>

      {/* Toggle */}
      <div className="flex items-center gap-2 p-1.5 bg-slate-800/50 rounded-2xl border border-slate-700/50">
        <button
          onClick={() => setUseKnownValue(false)}
          className={`flex-1 py-3.5 px-5 rounded-xl text-sm font-semibold transition-all ${!useKnownValue ? 'bg-gradient-to-r from-emerald-500 to-cyan-500 text-white shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white'}`}
        >
          Calculate my valuation
        </button>
        <button
          onClick={() => setUseKnownValue(true)}
          className={`flex-1 py-3.5 px-5 rounded-xl text-sm font-semibold transition-all ${useKnownValue ? 'bg-gradient-to-r from-emerald-500 to-cyan-500 text-white shadow-lg shadow-emerald-500/20' : 'text-slate-400 hover:text-white'}`}
        >
          I know my valuation
        </button>
      </div>

      {/* Form */}
      <div className="bg-slate-800/30 rounded-3xl border border-slate-700/50 p-8">
        {useKnownValue ? (
          <div className="grid md:grid-cols-2 gap-6">
            <label className="block md:col-span-2">
              <span className={labelClass}>Enterprise Value</span>
              <div className="relative">

                <input
                  type="number"

                />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">million</span>
              </div>
            </label>
            
            <label className="block">
              <span className={labelClass}>Your Ownership Percentage</span>
              <div className="relative">
                <input

                />
                <span className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500">%</span>

              <p className="text-slate-500 text-xs mt-2">Your fully diluted equity stake</p>
            </label>

            <label className="block">

              <p className="text-slate-500 text-xs mt-2">Reduces equity value</p>
            </label>

            <label className="block">

              <p className="text-slate-500 text-xs mt-2">Adds to equity value</p>

          </div>
        ) : (
          <div className="grid md:grid-cols-2 gap-6">

// SECTION 2: EXIT OPTIMIZATION

function OptimizerSection({ data, setData, onComplete, verifiedUser, advisorMode }) {
  const enterpriseValue = data.enterpriseValue || data.knownValuation;
  const debt = parseFloat(data.debt) * 1e6 || 0;
  const cash = parseFloat(data.cash) * 1e6 || 0;
  const equityValue = data.equityValue ? data.equityValue * 1e6 : (enterpriseValue ? enterpriseValue * 1e6 - debt + cash : 0);
  
  if (!enterpriseValue || !data.ownershipPercent || !data.state) {
    return (
      <div className="space-y-8">
        <div>
          <h2 className="text-4xl font-bold text-white mb-3">Exit Optimization</h2>
          <p className="text-slate-400 text-lg">See how much you could save with smart tax planning</p>
        </div>
        <div className="bg-amber-500/10 border border-amber-500/30 rounded-2xl p-8">
          <p className="text-amber-400 text-lg">Please complete the Business Valuation section first to see your optimized tax bill.</p>
        </div>
      </div>
    );
  }

  const ownershipPct = parseFloat(data.ownershipPercent) / 100;
  const proceeds = equityValue * ownershipPct;
  const costBasis = (parseFloat(data.costBasis) || 0) * 1e6;
  const gain = proceeds - costBasis;
  const stateRate = TAX_RATES.states[data.state]?.rate || 0;
  const fedRate = data.holdingPeriod === 'under-1' ? TAX_RATES.federalSTCG : TAX_RATES.federalLTCG;
  const totalRate = fedRate + TAX_RATES.federalNIIT + stateRate;
  const baselineTax = gain * totalRate;

  const married = data.married ?? null;
  const hasChildren = data.hasChildren ?? null;
  const philanthropic = data.philanthropic ?? null;
  
  const allocation = {
    entrepreneur: data.alloc_entrepreneur ?? 40,
    spouse: data.alloc_spouse ?? 30,
    kids: data.alloc_kids ?? 20,
    charity: data.alloc_charity ?? 10
  };

  const totalAlloc = allocation.entrepreneur + 
    (married ? allocation.spouse : 0) + 
    (hasChildren ? allocation.kids : 0) + 
    (philanthropic ? allocation.charity : 0);

  const qsbsEligible = data.entityType === 'c-corp' && data.holdingPeriod === '5-plus';
  const qsbsLimit = TAX_RATES.qsbsExclusionLimit;

  const entProceeds = proceeds * (allocation.entrepreneur / 100);
  const spouseProceeds = married ? proceeds * (allocation.spouse / 100) : 0;
  const kidsProceeds = hasChildren ? proceeds * (allocation.kids / 100) : 0;
  const charityProceeds = philanthropic ? proceeds * (allocation.charity / 100) : 0;

  const entQSBS = qsbsEligible ? Math.min(entProceeds, qsbsLimit) * fedRate : 0;
  const spouseQSBS = qsbsEligible && married ? Math.min(spouseProceeds, qsbsLimit) * fedRate : 0;
  const kidsQSBS = qsbsEligible && hasChildren ? Math.min(kidsProceeds, qsbsLimit) * fedRate : 0;
  const totalQSBS = entQSBS + spouseQSBS + kidsQSBS;

  const trustSavings = stateRate > 0 ? (spouseProceeds + kidsProceeds) * stateRate : 0;
  const charitySavings = charityProceeds * totalRate;
  const totalSavings = totalQSBS + trustSavings + charitySavings;
  const optimizedTax = Math.max(0, baselineTax - totalSavings);

  const showResults = married !== null && (totalAlloc === 100 || (!married && !hasChildren && !philanthropic));

  // Count strategies for public mode
  const strategyCount = (qsbsEligible ? 1 : 0) + (married || hasChildren ? 1 : 0) + (philanthropic ? 1 : 0);

  return (
    <div className="space-y-8">
      <div>
        <h2 className="text-4xl font-bold text-white mb-3">Exit Optimization</h2>
        <p className="text-slate-400 text-lg">{advisorMode ? 'Configure your exit strategy to minimize taxes' : 'See how much you could save with smart tax planning'}</p>
      </div>

      {/* Family Situation */}
      <div className="bg-slate-800/30 rounded-3xl border border-slate-700/50 p-8">
        <h3 className="text-xl font-bold text-white mb-6">Your Situation</h3>
        <div className="grid md:grid-cols-3 gap-8">
          <div>
            <p className="text-slate-300 text-sm font-medium mb-4">Are you married?</p>
            <div className="flex gap-3">
              <button onClick={() => setData(prev => ({ ...prev, married: true }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${married === true ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>Yes</button>
              <button onClick={() => setData(prev => ({ ...prev, married: false, alloc_spouse: 0 }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${married === false ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>No</button>
            </div>
          </div>
          <div>
            <p className="text-slate-300 text-sm font-medium mb-4">Do you have children?</p>
            <div className="flex gap-3">
              <button onClick={() => setData(prev => ({ ...prev, hasChildren: true }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${hasChildren === true ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>Yes</button>
              <button onClick={() => setData(prev => ({ ...prev, hasChildren: false, alloc_kids: 0 }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${hasChildren === false ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>No</button>
            </div>
          </div>
          <div>
            <p className="text-slate-300 text-sm font-medium mb-4">Interested in philanthropy?</p>
            <div className="flex gap-3">
              <button onClick={() => setData(prev => ({ ...prev, philanthropic: true }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${philanthropic === true ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>Yes</button>
              <button onClick={() => setData(prev => ({ ...prev, philanthropic: false, alloc_charity: 0 }))} className={`flex-1 py-3 rounded-xl text-sm font-semibold border-2 transition-all ${philanthropic === false ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500' : 'bg-slate-800/50 text-slate-400 border-slate-700 hover:border-slate-600'}`}>No</button>

                <p className="text-slate-500 text-sm mt-2">{formatCurrency(kidsProceeds)} proceeds</p>

function EstateSection({ data, setData, verifiedUser, onComplete, advisorMode }) {
  const enterpriseValue = data.enterpriseValue || data.knownValuation;
  const debt = parseFloat(data.debt) * 1e6 || 0;
  const cash = parseFloat(data.cash) * 1e6 || 0;
  const equityValue = data.equityValue ? data.equityValue * 1e6 : (enterpriseValue ? enterpriseValue * 1e6 - debt + cash : 0);
  const ownershipPct = parseFloat(data.ownershipPercent) / 100 || 0;
  const proceeds = equityValue * ownershipPct;
  
  if (!enterpriseValue) {
    return (
      <div className="space-y-8">

  const recommendations = [];
  const qsbsEligible = data.entityType === 'c-corp' && data.holdingPeriod === '5-plus';
  const stateTier = TAX_RATES.states[data.state]?.tier;

    recommendations.push({ ...TRUST_TYPES.slant, priority: 'Critical', reason: 'Stack QSBS exclusions across multiple trusts for $15M+ each' });

  if (data.married) {
    recommendations.push({ ...TRUST_TYPES.slat, priority: 'High', reason: 'Use lifetime exemption ($13.61M) with continued spousal access' });

              verifiedUser={verifiedUser}
              advisorMode={advisorMode}
            />
          )}
          {activeSection === 'estate' && (
            <EstateSection
              data={data}
              setData={setData}
              verifiedUser={verifiedUser}
              onComplete={() => handleSectionComplete('report')}
              advisorMode={advisorMode}
            />
          )}
          {activeSection === 'report' && advisorMode && (
            <ShareableReport
              data={data}
              verifiedUser={verifiedUser}
              onShare={(shareData) => {
                console.log('🔔 Notification: Report shared', shareData);
              }}
            />
          )}
        </main>
      </div>
    </div>
  );
}

// Render the app
const { useState } = React;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ExitPlanningSuite />);
console.log('Exit Planning Suite loaded successfully');
  </script>
</body>
